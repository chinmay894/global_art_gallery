<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Art Explorer</title>
<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
background:black;
}

.exploreContainer{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.exploreArt{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
scroll-snap-align:start;
}

.exploreArt img{
max-height:80vh;
max-width:90%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="exploreContainer" id="exploreContainer"></div>

<script>

const container = document.getElementById("exploreContainer")

let imageCount = 1

function loadExplore(){

for(let i=0;i<5;i++){

const div = document.createElement("div")
div.className = "exploreArt"

const img = document.createElement("img")
img.src = `https://picsum.photos/600/800?random=${imageCount++}`

const caption = document.createElement("p")
caption.innerText = "Artwork from global artist"

div.appendChild(img)
div.appendChild(caption)

container.appendChild(div)

}

}

loadExplore()

container.addEventListener("scroll",()=>{

if(container.scrollTop + container.clientHeight >= container.scrollHeight - 200){

loadExplore()

}

})

</script>

</body>

</html>
