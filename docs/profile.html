<!DOCTYPE html>

<html>

<head>
<title>Create Artist Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="profileContainer">

<h1>Create Your Artist Profile</h1>

<div class="profileCard">

<div class="avatarSection">

<img id="avatarPreview">

<input type="file" id="artistAvatar">

</div>

<div class="profileInputs">

<input type="text" id="artistName" placeholder="Artist Name">

<textarea id="artistBio" placeholder="Artist bio"></textarea>

<input type="text" id="artistInstagram" placeholder="Support link">

<button id="saveProfile">Save Profile</button>

</div>

</div>

</div>

<script type="module" src="profile.js"></script>

</body>

</html>
