<!DOCTYPE html>
<html>

<head>
<title>Upload Artwork</title>
</head>

<body>

<h2>Upload Artwork</h2>

<input id="title" placeholder="Artwork title">
<br><br>

<input type="file" id="image">
<br><br>

<button id="uploadBtn">Upload</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
const supabaseUrl = "https://fxtndjohhnyfuewyrcqm.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4dG5kam9oaG55ZnVld3lyY3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTQ1NzUsImV4cCI6MjA4ODM5MDU3NX0.MY7k5z2eAPypC1cFURAtw-XPBw8b_q4-iUzyFjgf4IU"

const supabase = createClient(supabaseUrl, supabaseKey)

document.getElementById("uploadBtn").addEventListener("click", async () => {
const { data: { user } } = await supabase.auth.getUser()

console.log("Logged user:", user)

if(!user){
alert("Please login first")
return
}
console.log("Upload clicked")

const file = document.getElementById("image").files[0]
const title = document.getElementById("title").value

if(!file){
alert("Select an image first")
return
}

const fileName = Date.now() + "-" + file.name

const { error: uploadError } =
await supabase.storage
.from("artworks")
.upload(fileName, file)

if(uploadError){
console.error(uploadError)
alert("Upload failed")
return
}

const { data } =
supabase.storage
.from("artworks")
.getPublicUrl(fileName)

const { error: insertError } =
await supabase
.from("artworks")
.insert([
{
title: title,
image_url: data.publicUrl,
status: "pending"
}
])

if(insertError){
console.error(insertError)
alert("Database insert failed")
return
}

alert("Artwork submitted")

})

</script>

</body>
</html>
